sentence=Lightweight BMI330 IMU driver for Arduino (I2C/SPI) with beginner-friendly defaults.
paragraph=Arduino library for the Bosch Sensortec BMI330 6-axis IMU (accelerometer + gyroscope + temperature). Supports I2C and SPI on Arduino-core boards (ESP32/AVR/STM32/RP2040 etc). Includes safe default configuration so the sensor works out-of-box, plus helpers for FIFO, interrupts, and BMI330 feature engine (step/tap/motion/orientation/flat/tilt).
